<header class="navigation horizontal_header transparentOnScroll navbar navbar-expand-lg fixed-top">
  <div class="header-ins">
    <div class="container">
      <!--LOGO AREA-->
      <div class="site-logo">
        <a href="#" class="hoveroff" title="">
          <!--<img src="" alt="">-->
          Yann <span>Ouattara</span>
        </a>
      </div>
      <button class="button-toggler navbar-toggler collapsed" type="button" data-target="#navigation" data-toggle="collapse" aria-controls="navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <!--Main Navigation START-->
      <ul class="justify-content-end scrollspy collapse navbar-collapse" id="navigation">
        <li>
          <a href="#home" class="nav-link">Home</a>
        </li>
        <li>
          <a href="#about" class="nav-link">About</a>
        </li>
        <li>
          <a href="#service" class="nav-link">Compétences</a>
        </li>
        <li>
          <a href="#portfolio" class="nav-link">Portfolio</a>
        </li>
        <li>
          <a href="#resume" class="nav-link">Resume</a>
        </li>
        <li>
          <a href="#contact" class="nav-link">Contact</a>
        </li>
      </ul>
      <!--Main Navigation END-->

      <!-- Bouton Toggle Thème -->
      <button class="theme-toggle"
              (click)="themeService.toggle()"
              [attr.aria-label]="themeService.theme() === 'dark' ? 'Passer en mode clair' : 'Passer en mode sombre'"
              [title]="themeService.theme() === 'dark' ? 'Mode clair' : 'Mode sombre'">
        <i [class]="themeService.theme() === 'dark' ? 'fas fa-sun' : 'fas fa-moon'"></i>
      </button>

    </div>
  </div>

</header>
